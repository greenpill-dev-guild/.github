# Greenpill Dev Guild — shared label manifest
#
# Single source of truth for labels that should exist across every guild repo
# that opts into the labels-sync reusable workflow (see
# .github/workflows/labels-sync.yml once Phase 2 is wired up).
#
# Consumer usage:
#
#   # In any guild repo, at .github/workflows/labels-sync.yml:
#   on:
#     workflow_dispatch:
#     push:
#       branches: [main]
#       paths: [.github/workflows/labels-sync.yml]
#   jobs:
#     sync:
#       uses: greenpill-dev-guild/.github/.github/workflows/labels-sync.yml@main
#
# Design:
# - Start with `delete: false` (add-missing mode) so the sync does not prune
#   any repo-specific labels (e.g., `admin`, `client`, `contract` package
#   scopes in green-goods) while the guild consolidates.
# - Repos that need additional, project-specific labels define them locally.
#   The sync only governs labels declared in this file.
# - Flip to `delete: true` once every consuming repo has been audited and
#   everyone agrees on the canonical set.
#
# Tool: https://github.com/EndBug/label-sync (YAML format; `delete-other-labels` flag controls prune behavior)

# ─── GitHub defaults ─────────────────────────────────────────────────────────
# Minimal kept set — `bug` and `enhancement` removed (redundant with issue
# templates and work-type labels). Close-reason labels (duplicate/invalid/
# wontfix/question) removed in favor of GitHub's native close-reasons.

- name: documentation
  color: '0075ca'
  description: Improvements or additions to documentation
- name: good first issue
  color: '7057ff'
  description: Good for newcomers

# ─── Dependency automation ───────────────────────────────────────────────────

- name: dependencies
  color: '0366d6'
  description: Dependency bumps from Dependabot

# ─── Work-type dimensions ────────────────────────────────────────────────────
# Dimensions describe the kind of work. They stand alone and also stack with
# `polish` (gg-client-polish audit findings). `design` is guild-level because
# Figma/wireframe work happens in every guild project.

- name: design
  color: 'c084fc'
  description: Design work — Figma, wireframes, mockups, visual polish
- name: architecture
  color: 'fbca04'
  description: Patterns, hook boundaries, state management
- name: testing
  color: '0e8a16'
  description: Test coverage, quality, or missing scenarios
- name: performance
  color: 'e4e669'
  description: Performance or PWA-specific concerns
- name: quality
  color: 'f9d0c4'
  description: Code quality, principles, dead code

# ─── Report sources ──────────────────────────────────────────────────────────
# Where a report came from. Stacks with `polish` for user-reported issues
# surfaced by gg-client-polish.

- name: source:discord
  color: '5865F2'
  description: Reported via Discord
- name: source:telegram
  color: '229ED9'
  description: Reported via Telegram bot
- name: source:drive
  color: 'c5def5'
  description: Surfaced from Drive meeting notes

# ─── Automation umbrella ─────────────────────────────────────────────────────

- name: automated/claude
  color: '0075ca'
  description: Authored by a Claude automation
- name: automated/codex
  color: '0075ca'
  description: PR opened by Codex

# ─── Routine: health — ops checks (gg-morning-watch) ─────────────────────────
# Dedupe: one open issue per category.

- name: health:indexer
  color: '0e8a16'
  description: 'Morning-watch: Envio indexer is lagging or unreachable'
- name: health:ci
  color: '0e8a16'
  description: 'Morning-watch: recent CI failures on main'
- name: health:contracts
  color: '0e8a16'
  description: 'Morning-watch: on-chain state drift (vaults, yield split, garden activity)'

# ─── Routine: metrics — data-analyst (gg-data-analyst) ───────────────────────

- name: metrics:anomaly
  color: 'd73a4a'
  description: 'Data-analyst: metric anomaly in Dune or PostHog'

# ─── Routine: polish — umbrella (gg-client-polish) ───────────────────────────
# Applied to every gg-client-polish output, stacked with a dimension
# (design/architecture/testing/performance/quality) or a source label.

- name: polish
  color: 'C5DEF5'
  description: Issue raised by the gg-client-polish audit

# ─── Routine: grant — lifecycle (gg-grant-scout) ─────────────────────────────
# One issue per program; label transitions as the opportunity progresses.
# Awarded/rejected final states live on the Project board, not as labels.

- name: grant
  color: 'd93f0b'
  description: Grant opportunity or application
- name: grant:prospect
  color: 'd93f0b'
  description: Grant opportunity identified, not yet acted on
- name: grant:drafting
  color: 'd93f0b'
  description: Grant proposal being drafted (see Drive link in body)
- name: grant:submitted
  color: 'd93f0b'
  description: Grant proposal submitted, awaiting response

# ─── Agent assignment ────────────────────────────────────────────────────────
# Applied when an auto-implementer routine starts work on an issue. Removes
# the issue from future dispatch pools; remove manually to re-dispatch.

- name: agent:assigned:claude
  color: '5319e7'
  description: Claude is implementing this — remove to re-dispatch
