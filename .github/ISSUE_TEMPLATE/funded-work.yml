name: Funded scoped work reference
description: Reference issue for grant-dependent or sponsor-funded scoped work.
title: "[funded-work]: "
type: Task
body:
  - type: markdown
    attributes:
      value: |
        ## How to use this

        Funded work is not open-ended by default. It depends on an active grant, sponsor commitment, or steward-approved budget.

        Linear is the project-management source of truth for funded scoped work. Use this GitHub issue only as the **public execution-side reference** when repo-local implementation, review, or open discussion needs a GitHub surface.

        Use this template when a maintainer or steward has confirmed that a GitHub execution reference is useful for accepted or proposed funded scoped work.

        Read the [Contributing guide](https://github.com/greenpill-dev-guild/.github/blob/main/CONTRIBUTING.md#funded-scoped-work) before filing.

  - type: input
    id: linear_reference
    attributes:
      label: Linear or funding reference
      description: Link to the Linear issue, grant scope, sponsor approval, or maintainer note.
      placeholder: https://linear.app/greenpill-dev-guild/...
    validations:
      required: false

  - type: input
    id: project
    attributes:
      label: Project
      description: Which guild project does this funded work target?
      placeholder: green-goods
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What will be delivered? Include the user-facing or technical outcome.
    validations:
      required: true

  - type: textarea
    id: timeline
    attributes:
      label: Timeline
      description: Estimated start, milestones, and completion date.
    validations:
      required: true

  - type: textarea
    id: technical
    attributes:
      label: Technical context
      description: Architecture notes, packages touched, dependencies, risks.
    validations:
      required: false

  - type: textarea
    id: contributor
    attributes:
      label: Contributor
      description: Who is taking this on? Include relevant prior work or links.
    validations:
      required: true

  - type: checkboxes
    id: agreements
    attributes:
      label: Working agreements
      options:
        - label: I will participate in regular check-ins for the duration of this scoped work.
          required: true
        - label: All code and dependencies will be open-source.
          required: true
        - label: I have read the [Code of Conduct](https://github.com/greenpill-dev-guild/.github/blob/main/CODE_OF_CONDUCT.md).
          required: true
