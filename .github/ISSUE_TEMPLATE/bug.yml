name: Bug report
description: Report a defect or unexpected behavior in a guild project.
title: "[bug]: "
type: Bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this. Before submitting:
        - Check if the issue is already reported in the project's issue tracker.
        - For **security vulnerabilities**, do not file a public issue — email `security@greenpill.builders` instead.

  - type: input
    id: project
    attributes:
      label: Project
      description: Which guild project is affected? (e.g. `green-goods`, `coop`, `cookie-jar`)
      placeholder: green-goods
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One or two sentences describing the bug.
      placeholder: Garden filter dropdown does not persist selection across page reloads.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: A minimal sequence that reproduces the bug.
      placeholder: |
        1. Navigate to /gardens
        2. Apply the "Active" filter
        3. Reload the page
        4. Observe filter is reset
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: Filter selection persists across reloads.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: Filter resets to "All" on reload.
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, network conditions, version/commit if known.
      placeholder: Chrome 138 · macOS 15 · Sepolia · commit abc1234
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs, screenshots, or attachments
      description: Paste relevant logs (in code blocks) or attach screenshots.
      render: shell
    validations:
      required: false

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - blocker (data loss, prod outage, security)
        - major (broken core flow, no workaround)
        - minor (broken edge case or workaround exists)
        - cosmetic (visual or copy issue)
    validations:
      required: true

  - type: checkboxes
    id: confirms
    attributes:
      label: Confirmations
      options:
        - label: I have searched existing issues and confirmed this is not a duplicate.
          required: true
        - label: I have read the [Code of Conduct](https://github.com/greenpill-dev-guild/.github/blob/main/CODE_OF_CONDUCT.md).
          required: true
