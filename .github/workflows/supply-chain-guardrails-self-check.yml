name: Supply Chain Guardrails

on:
  pull_request:
    paths:
      - "scripts/audit-supply-chain-guardrails.mjs"
      - ".github/workflows/supply-chain-guardrails*.yml"
      - "AGENTS.md"
      - "CLAUDE.md"
      - "templates/**"
  push:
    branches: [main]
    paths:
      - "scripts/audit-supply-chain-guardrails.mjs"
      - ".github/workflows/supply-chain-guardrails*.yml"
      - "AGENTS.md"
      - "CLAUDE.md"
      - "templates/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    uses: ./.github/workflows/supply-chain-guardrails.yml
    with:
      mode: ci
      fail-on-warning: false
      working-directory: "."
