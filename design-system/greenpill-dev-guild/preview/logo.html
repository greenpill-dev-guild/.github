<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Logo" subtitle="Pill mark + horizontal lockup" viewport="700x200" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Logo</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;width:700px;height:200px;background:var(--color-cal-poly-green);display:flex;align-items:center;justify-content:center;}
  .wrap{display:flex;align-items:center;gap:48px;padding:24px;}
  .pill{width:80px;height:auto;}
  .lockup{height:80px;}
  .row{display:flex;flex-direction:column;gap:10px;align-items:center;}
  .name{font-family:var(--font-display);font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--color-creme);font-weight:600;}
</style>
</head>
<body>
  <div class="wrap">
    <div class="row">
      <img class="pill" src="../assets/pill-mark-spring.png" alt="">
      <div class="name">Pill mark · Creme</div>
    </div>
    <div class="row">
      <img class="lockup" src="../assets/logo-horizontal-spring.png" alt="">
      <div class="name">Horizontal lockup</div>
    </div>
    <div class="row">
      <img class="pill" src="../assets/pill-mark-creme.png" alt="">
      <div class="name">Pill mark · Spring</div>
    </div>
  </div>
</body>
</html>
