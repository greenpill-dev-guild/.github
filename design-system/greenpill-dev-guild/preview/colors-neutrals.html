<!DOCTYPE html>
<!-- @dsCard group="Colors" name="Neutrals" subtitle="Parchment, Ink, Fog, Steady Flame, Forest Deep" viewport="700x200" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Neutrals</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:24px;width:652px;background:var(--color-parchment);font-family:var(--font-body);}
  .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;}
  .swatch{display:flex;flex-direction:column;height:140px;border-radius:14px;overflow:hidden;border:1px solid rgba(31,61,31,0.08);}
  .chip{flex:1;}
  .meta{padding:8px 10px;background:#fff;}
  .name{font-family:var(--font-display);font-weight:600;font-size:11px;color:var(--color-cal-poly-green);}
  .hex{font-family:var(--font-mono);font-size:10px;color:rgba(31,61,31,0.7);margin-top:2px;}
</style>
</head>
<body>
  <div class="grid">
    <div class="swatch"><div class="chip" style="background:#FFF8E1"></div><div class="meta"><div class="name">Parchment</div><div class="hex">#FFF8E1</div></div></div>
    <div class="swatch"><div class="chip" style="background:#0F1F0F"></div><div class="meta"><div class="name">Ink</div><div class="hex">#0F1F0F</div></div></div>
    <div class="swatch"><div class="chip" style="background:#E8EFE3"></div><div class="meta"><div class="name">Fog</div><div class="hex">#E8EFE3</div></div></div>
    <div class="swatch"><div class="chip" style="background:#7DC400"></div><div class="meta"><div class="name">Steady Flame</div><div class="hex">#7DC400</div></div></div>
    <div class="swatch"><div class="chip" style="background:#254D32"></div><div class="meta"><div class="name">Forest Deep</div><div class="hex">#254D32</div></div></div>
  </div>
</body>
</html>
