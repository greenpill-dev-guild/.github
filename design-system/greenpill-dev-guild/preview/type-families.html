<!DOCTYPE html>
<!-- @dsCard group="Type" name="Type families" subtitle="Space Grotesk · Satoshi · JetBrains Mono" viewport="700x220" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Type Families</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:24px;width:652px;background:var(--color-parchment);color:var(--color-cal-poly-green);}
  .grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
  .card{background:#fff;border-radius:14px;padding:20px;border:1px solid rgba(31,61,31,0.08);}
  .name{font-size:11px;font-family:var(--font-mono);text-transform:uppercase;letter-spacing:0.1em;color:rgba(31,61,31,0.6);margin-bottom:8px;}
  .glyph{font-size:88px;line-height:1;letter-spacing:-0.04em;}
  .desc{font-family:var(--font-body);font-size:11px;color:rgba(31,61,31,0.7);margin-top:8px;}
</style>
</head>
<body>
  <div class="grid">
    <div class="card">
      <div class="name">Display</div>
      <div class="glyph" style="font-family:var(--font-display);font-weight:700;">Aa</div>
      <div class="desc">Space Grotesk · 500/600/700</div>
    </div>
    <div class="card">
      <div class="name">Body</div>
      <div class="glyph" style="font-family:var(--font-body);font-weight:500;">Aa</div>
      <div class="desc">Satoshi · 400/500/700</div>
    </div>
    <div class="card">
      <div class="name">Mono</div>
      <div class="glyph" style="font-family:var(--font-mono);font-weight:500;font-size:72px;">Aa</div>
      <div class="desc">JetBrains Mono · 400/500/700</div>
    </div>
  </div>
</body>
</html>
