<!DOCTYPE html>
<!-- @dsCard group="Components" name="Badge discs" subtitle="Spring discs with line icons + glow" viewport="700x180" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Badge discs</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:32px;width:636px;background:var(--color-cal-poly-green);}
  .row{display:flex;gap:24px;align-items:center;}
  .disc{width:64px;height:64px;border-radius:999px;background:#C2FF1A;display:flex;align-items:center;justify-content:center;}
  .glow{box-shadow:0 0 0 4px rgba(194,255,26,0.18), 0 0 24px rgba(194,255,26,0.35);}
  .glow-md{box-shadow:0 0 0 8px rgba(194,255,26,0.16), 0 0 48px rgba(194,255,26,0.45);}
  .label{font-family:var(--font-mono);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:rgba(252,236,166,0.5);margin-top:8px;text-align:center;}
  .col{display:flex;flex-direction:column;align-items:center;}
</style>
</head>
<body>
  <div class="row">
    <div class="col">
      <div class="disc">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#1F3D1F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/><path d="M2 21c0-3 1.85-5.36 5.08-6"/></svg>
      </div>
      <div class="label">flat</div>
    </div>
    <div class="col">
      <div class="disc glow">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#1F3D1F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m8 3 4 8 5-5 5 15H2L8 3z"/></svg>
      </div>
      <div class="label">glow-sm</div>
    </div>
    <div class="col">
      <div class="disc glow-md">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#1F3D1F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/></svg>
      </div>
      <div class="label">glow-md</div>
    </div>
    <div class="col">
      <div class="disc">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#1F3D1F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12h20"/><path d="M5 12V7a3 3 0 0 1 6 0v10a3 3 0 0 0 6 0v-5"/></svg>
      </div>
      <div class="label">bridge</div>
    </div>
    <div class="col">
      <div class="disc">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#1F3D1F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m8 3 4 8 5-5 5 15H2L8 3z"/></svg>
      </div>
      <div class="label">mountain</div>
    </div>
    <div class="col">
      <div class="disc">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#1F3D1F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>
      </div>
      <div class="label">globe</div>
    </div>
  </div>
</body>
</html>
