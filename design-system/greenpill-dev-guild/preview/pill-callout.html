<!DOCTYPE html>
<!-- @dsCard group="Components" name="Pill callout" subtitle="Glowing capsule for hero quotes" viewport="700x200" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pill Callout</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:32px;width:636px;background:var(--color-cal-poly-green);display:flex;align-items:center;justify-content:center;}
  .pill{background:#C2FF1A;color:#1F3D1F;border-radius:999px;padding:24px 40px;font-family:var(--font-display);font-weight:600;font-size:24px;letter-spacing:-0.005em;box-shadow:0 0 0 8px rgba(194,255,26,0.16), 0 0 48px rgba(194,255,26,0.45);display:inline-flex;align-items:center;gap:14px;}
  .ico{width:24px;height:24px;border-radius:999px;background:#1F3D1F;}
</style>
</head>
<body>
  <div class="pill"><span class="ico"></span>Switched on for change.</div>
</body>
</html>
