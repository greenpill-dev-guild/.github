<!DOCTYPE html>
<!-- @dsCard group="Spacing" name="Elevation & glow" subtitle="Restrained shadow, signature spring-glow" viewport="700x260" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Elevation & Glow</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:24px;width:652px;background:var(--color-parchment);}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
  .panel{padding:24px;border-radius:14px;display:flex;flex-direction:column;align-items:center;gap:14px;}
  .light{background:#FFF8E1;}
  .dark{background:#1F3D1F;}
  .box{width:80px;height:60px;border-radius:14px;background:#fff;}
  .label{font-family:var(--font-mono);font-size:10px;color:rgba(31,61,31,0.6);text-transform:uppercase;letter-spacing:0.08em;}
  .dark .label{color:rgba(252,236,166,0.6);}
  .glow{width:48px;height:48px;border-radius:999px;background:#C2FF1A;}
  .e1{box-shadow:0 1px 2px rgba(31,61,31,0.06), 0 2px 8px rgba(31,61,31,0.06);}
  .e2{box-shadow:0 4px 12px rgba(31,61,31,0.10), 0 12px 32px rgba(31,61,31,0.08);}
  .e3{box-shadow:0 12px 32px rgba(15,31,15,0.18);}
  .gs{box-shadow:0 0 0 4px rgba(194,255,26,0.18), 0 0 24px rgba(194,255,26,0.35);}
  .gm{box-shadow:0 0 0 8px rgba(194,255,26,0.16), 0 0 48px rgba(194,255,26,0.45);}
  .gl{box-shadow:0 0 64px 8px rgba(194,255,26,0.55);}
</style>
</head>
<body>
  <div class="grid">
    <div class="panel light"><div class="box e1"></div><div class="label">elev-1</div></div>
    <div class="panel light"><div class="box e2"></div><div class="label">elev-2</div></div>
    <div class="panel light"><div class="box e3"></div><div class="label">elev-3</div></div>
    <div class="panel dark"><div class="glow gs"></div><div class="label">glow-sm</div></div>
    <div class="panel dark"><div class="glow gm"></div><div class="label">glow-md</div></div>
    <div class="panel dark"><div class="glow gl"></div><div class="label">glow-lg</div></div>
  </div>
</body>
</html>
