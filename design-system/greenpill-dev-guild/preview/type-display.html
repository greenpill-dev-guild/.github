<!DOCTYPE html>
<!-- @dsCard group="Type" name="Type display" subtitle="Display + headline scale" viewport="700x260" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Type Display</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:32px;width:636px;background:var(--color-parchment);color:var(--color-cal-poly-green);}
  .stack{display:flex;flex-direction:column;gap:18px;}
  .row{display:flex;align-items:baseline;gap:16px;}
  .label{font-family:var(--font-mono);font-size:11px;color:rgba(31,61,31,0.55);min-width:100px;}
  .specimen{font-family:var(--font-display);}
</style>
</head>
<body>
  <div class="stack">
    <div class="row"><div class="label">display-xl 96/700</div><div class="specimen" style="font-size:64px;font-weight:700;line-height:1;letter-spacing:-0.03em;">Fellowship</div></div>
    <div class="row"><div class="label">display-md 60/700</div><div class="specimen" style="font-size:44px;font-weight:700;line-height:1;letter-spacing:-0.02em;">Switched On</div></div>
    <div class="row"><div class="label">h1 56/700</div><div class="specimen" style="font-size:32px;font-weight:700;line-height:1;letter-spacing:-0.02em;">Take the Greenpill</div></div>
    <div class="row"><div class="label">h2 40/600</div><div class="specimen" style="font-size:24px;font-weight:600;line-height:1;letter-spacing:-0.015em;">A guild for regeneration</div></div>
  </div>
</body>
</html>
