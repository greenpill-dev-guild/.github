<!DOCTYPE html>
<!-- @dsCard group="Colors" name="Brand colors" subtitle="Spring · Cal Poly · Creme · Mint · Alice · Cryola" viewport="700x200" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Brand Colors</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:24px;width:652px;background:var(--color-parchment);font-family:var(--font-body);}
  .grid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;}
  .swatch{display:flex;flex-direction:column;height:140px;border-radius:14px;overflow:hidden;border:1px solid rgba(31,61,31,0.08);}
  .chip{flex:1;}
  .meta{padding:8px 10px;background:var(--color-parchment);}
  .name{font-family:var(--font-display);font-weight:600;font-size:11px;color:var(--color-cal-poly-green);letter-spacing:0.02em;}
  .hex{font-family:var(--font-mono);font-size:10px;color:rgba(31,61,31,0.7);margin-top:2px;}
</style>
</head>
<body>
  <div class="grid">
    <div class="swatch"><div class="chip" style="background:#C2FF1A"></div><div class="meta"><div class="name">Spring Green</div><div class="hex">#C2FF1A</div></div></div>
    <div class="swatch"><div class="chip" style="background:#1F3D1F"></div><div class="meta"><div class="name">Cal Poly Green</div><div class="hex">#1F3D1F</div></div></div>
    <div class="swatch"><div class="chip" style="background:#FCECA6"></div><div class="meta"><div class="name">Creme</div><div class="hex">#FCECA6</div></div></div>
    <div class="swatch"><div class="chip" style="background:#B1FDEB"></div><div class="meta"><div class="name">Mint Green</div><div class="hex">#B1FDEB</div></div></div>
    <div class="swatch"><div class="chip" style="background:#DCEDFF"></div><div class="meta"><div class="name">Alice Blue</div><div class="hex">#DCEDFF</div></div></div>
    <div class="swatch"><div class="chip" style="background:#FF6978"></div><div class="meta"><div class="name">Cryola</div><div class="hex">#FF6978</div></div></div>
  </div>
</body>
</html>
